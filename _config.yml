# Starter configuration for a GitHub Pages site based on the al-folio Jekyll theme.
# Replace the placeholder values before publishing.

title: Matthew Frazier
first_name: Matthew
last_name: Frazier
email: matthew@udel.edu
description: >
  Senior software engineer building scalable backend systems, AI-powered applications,
  and production data platforms.

url: https://YOUR_GITHUB_USERNAME.github.io
baseurl: ""

navbar_fixed: true
footer_fixed: true
search_enabled: false
max_width: 1000px

# Social links
linkedin_username: matthewrfrazier
github_username: YOUR_GITHUB_USERNAME
scholar_userid: ""
orcid_id: ""

# Profile image
profile:
  align: right
  image: profile-placeholder.png
  image_circular: false
  more_info: >
    <p>St. Petersburg, FL</p>
    <p>Senior Software Engineer</p>
    <p>Ph.D., Computer and Information Sciences</p>

news: true
latest_posts: false
selected_papers: false

# About page settings
about:
  title: about
  nav: true
  nav_order: 1

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: page
      author: Matthew Frazier
      redirect: false

# Optional theme controls
markdown: kramdown
highlighter: rouge

# Author highlighting for publications
scholar:
  last_name: [Frazier]
  first_name: [Matthew, Matt, Matthew R.]
