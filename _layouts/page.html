layout: default
---
<!-- page.html -->
        <div class="post{% if page.page_class %} {{ page.page_class }}{% endif %}">

          <header class="post-header">
            <h1 class="post-title">{% if page.heading %}{{ page.heading }}{% else %}{{ page.title }}{% endif %}</h1>
            <p class="post-description">{{ page.description }}</p>
          </header>

          <article>
            {{ content }}
          </article>

        </div>
